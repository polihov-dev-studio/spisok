<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Buylist</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="auth">
  <h2>Вход</h2>
  <input id="password" type="password" placeholder="Пароль"/>
  <button onclick="login()">Войти</button>
</div>

<div id="app" style="display:none;">
  <header>
    <h1>Buylist</h1>
    <button onclick="toggleFilters()">Фильтры</button>
  </header>

  <div id="filters" style="display:none;">
    <input id="search" placeholder="Поиск" oninput="render()"/>
  </div>

  <div>
    <select id="listSelect" onchange="switchList()"></select>
    <input id="newList" placeholder="Новый список"/>
    <button onclick="addList()">+</button>
  </div>

  <div id="items"></div>

  <h3>Добавить товар</h3>
  <input id="title" placeholder="Название"/>
  <input id="price" type="number" placeholder="Цена"/>
  <button onclick="addItem()">Добавить</button>

  <button onclick="saveToGithub()">Сохранить в GitHub</button>
</div>

<script src="app.js"></script>
</body>
</html>
