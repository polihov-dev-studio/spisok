<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buylist Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth" class="center">
  <div class="card glass">
    <h1>Buylist</h1>
    <input id="password" type="password" placeholder="Пароль">
    <button onclick="login()">Войти</button>
  </div>
</div>

<div id="app" class="hidden">

<header class="glass">
  <div class="left">
    <h1>Buylist</h1>
    <select id="listSelect" onchange="switchList()"></select>
    <input id="newList" placeholder="Новый список">
    <button onclick="addList()">+</button>
  </div>
  <div class="right">
    <button onclick="toggleFilters()">Фильтры</button>
    <button onclick="save()">Сохранить</button>
  </div>
</header>

<div id="filters" class="panel glass hidden">
  <input id="search" placeholder="Поиск..." oninput="render()">
</div>

<div id="stats" class="stats"></div>

<div id="items" class="grid"></div>

<div class="panel glass">
  <h3>Добавить / редактировать</h3>
  <input id="title" placeholder="Название">
  <input id="price" type="number" placeholder="Цена">
  <input id="image" placeholder="Фото URL">
  <button onclick="saveItem()">Сохранить товар</button>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
